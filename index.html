<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karinna</title>
  <style>
    @font-face {
      font-family: 'KarinnaFont';
      src: url('Karinnafont-Regular.otf') format('opentype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background-color: black;
      padding: 20px;
    }
    .site-wrapper {
      width: 100vw;
      min-height: 100vh;
      background-image: url('legalpad.jpg');
      background-size: 100% auto;
      background-repeat: no-repeat;
      background-position: top left;
    }
    .page {
      padding-top: 24.00vw;
      padding-left: 15.5vw;
      padding-right: 5vw;
    }
    .handwriting {
      font-family: 'KarinnaFont', cursive;
      font-size: 3.8vw;
      color: transparent;
      background-image: url('pencil.jpg');
      background-size: cover;
      -webkit-background-clip: text;
      background-clip: text;
      filter: drop-shadow(0px 0px 0.04vw rgba(0,0,0,0.35));
      line-height: 4.76vw;
      display: block;
    }
  </style>
</head>
<body>
  <div class="site-wrapper">
    <div class="page">
      <span class="handwriting">Hi, my name is Karinna and this is my website!</span>
    </div>
  </div>
</body>
</html>
